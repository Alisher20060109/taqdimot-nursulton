<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="container nav">
      <h2>NFT Marketplace</h2>

      <div class="menu">
        <a href="rating.html" class="btn">⭐ Rating</a>
        <a href="./nft.html" class="btn">Connect Wallet</a>
        <a href="./page-2.html" class="btn">Creator</a>
        <a href="./sing.html" class="btn">Sign Up</a>
      </div>
    </div>
  </header>

  <!-- MAIN WRAPPER -->
  <section class="container auth-page">

    <!-- LEFT IMAGE -->
    <div class="left">
      <!-- agar rasm bo‘lsa:
      <img src="signup.png" alt="">
      -->
    </div>

    <!-- RIGHT FORM -->
    <div class="right">
      <a href="index.html" class="btn back">← Marketplace</a>

      <h1>Create Account</h1>
      <p>
        Welcome! Enter your details and start creating,
        collecting and selling NFTs.
      </p>

      <form>
        <label>Username</label>
        <input type="text" placeholder="Username" required>

        <label>Email</label>
        <input type="email" placeholder="Email Address" required>

        <label>Password</label>
        <input type="password" placeholder="Password" required>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm Password" required>

        <button type="submit">Create Account</button>
      </form>
    </div>

  </section>

</body>
</html>
